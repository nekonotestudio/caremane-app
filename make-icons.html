<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>ケアマネ アイコン生成</title></head>
<body style="font-family:sans-serif;padding:20px;background:#15182e;color:#e4e6f4;">
<h2 style="color:#818cf8;">ケアマネ アイコン生成</h2>
<canvas id="c192" width="192" height="192" style="border:1px solid #2e3358;margin:8px;"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #2e3358;margin:8px;width:128px;height:128px;"></canvas>
<br>
<button onclick="dl('c192','icon-192.png')" style="margin:6px;padding:8px 16px;background:#818cf8;color:#15182e;border:none;cursor:pointer;font-weight:700;">icon-192.png をダウンロード</button>
<button onclick="dl('c512','icon-512.png')" style="margin:6px;padding:8px 16px;background:#818cf8;color:#15182e;border:none;cursor:pointer;font-weight:700;">icon-512.png をダウンロード</button>
<script>
function draw(id){
  const c=document.getElementById(id); const s=c.width; const ctx=c.getContext('2d');
  const g=ctx.createLinearGradient(0,0,s,s); g.addColorStop(0,'#15182e'); g.addColorStop(1,'#2a2e54');
  const r=s*0.18; ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(s-r,0);ctx.quadraticCurveTo(s,0,s,r);ctx.lineTo(s,s-r);ctx.quadraticCurveTo(s,s,s-r,s);ctx.lineTo(r,s);ctx.quadraticCurveTo(0,s,0,s-r);ctx.lineTo(0,r);ctx.quadraticCurveTo(0,0,r,0);ctx.closePath();ctx.clip();
  ctx.fillStyle=g; ctx.fillRect(0,0,s,s);
  // チェックリスト風の枠
  ctx.strokeStyle='rgba(251,191,36,0.3)'; ctx.lineWidth=s*0.016;
  ctx.strokeRect(s*0.28,s*0.2,s*0.44,s*0.5);
  ctx.strokeStyle='rgba(129,140,248,0.4)';
  for(let i=0;i<3;i++){ ctx.beginPath(); ctx.moveTo(s*0.34,s*(0.32+i*0.12)); ctx.lineTo(s*0.66,s*(0.32+i*0.12)); ctx.stroke(); }
  // ケアマネ
  ctx.fillStyle='#818cf8'; ctx.font=`bold ${s*0.2}px 'Hiragino Kaku Gothic ProN',sans-serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(129,140,248,0.5)'; ctx.shadowBlur=s*0.06;
  ctx.fillText('ケア', s*0.5, s*0.45);
  ctx.fillText('マネ', s*0.5, s*0.66);
  ctx.shadowBlur=0; ctx.fillStyle='#fbbf24'; ctx.font=`bold ${s*0.1}px sans-serif`;
  ctx.fillText('一問一答', s*0.5, s*0.86);
}
function dl(id,name){ const c=document.getElementById(id); const a=document.createElement('a'); a.download=name; a.href=c.toDataURL('image/png'); a.click(); }
draw('c192'); draw('c512');
</script>
</body>
</html>
